indexer:
  enabled: true

dirs:
  projects/compute:
    workspaces:
      default: {}
      prod: {}

drift:
  enabled: true
  schedules:
    default:
      tag_query: ''
      schedule: hourly

hooks:
  all:
    pre:
      - type: oidc
        provider: aws
        role_arn: "arn:aws:iam::010438481177:role/terrateam"
      - type: env
        name: AWS_CONFIG_FILE
        cmd: ['echo', '$TERRATEAM_ROOT/.terrateam/.aws_config']
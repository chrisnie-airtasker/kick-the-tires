dirs:
  projects/networking: {}
  projects/compute: {}
  projects/database: {}
  projects/storage: {}
  projects/monitoring: {}

hooks:
  all:
    pre:
      - type: oidc
        provider: aws
        role_arn: "arn:aws:iam::010438481177:role/terrateam"
      - type: env
        name: AWS_CONFIG_FILE
        cmd: ['echo', '$TERRATEAM_ROOT/.terrateam/.aws_config']